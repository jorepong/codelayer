<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 800" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', 'Malgun Gothic', sans-serif" fill="#1f2733">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7686"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="800" fill="#ffffff"/>

  <!-- ===== 개발 레이어 밴드 ===== -->
  <rect x="20" y="46" width="840" height="150" rx="14" fill="#eef3fa" stroke="#d3e0f0"/>
  <text x="40" y="72" font-size="13" font-weight="700" fill="#3f6fb0">개발 레이어 · 구현 중엔 설명하지 않는다 (코드 품질 최우선)</text>

  <!-- ① 플랜 -->
  <rect x="70" y="86" width="300" height="90" rx="10" fill="#ffffff" stroke="#3f6fb0" stroke-width="1.6"/>
  <text x="220" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#284a75">① 플랜 작성</text>
  <text x="220" y="140" text-anchor="middle" font-size="12.5" fill="#5c6673">.plan/current.md</text>
  <text x="220" y="160" text-anchor="middle" font-size="12.5" fill="#5c6673">기획 + 구현 단계 → 승인</text>

  <!-- ② 구현 -->
  <rect x="510" y="86" width="300" height="90" rx="10" fill="#ffffff" stroke="#3f6fb0" stroke-width="1.6"/>
  <text x="660" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#284a75">② 단계 구현</text>
  <text x="660" y="140" text-anchor="middle" font-size="12.5" fill="#5c6673">실무 수준 코드 · 설명 없음</text>
  <text x="660" y="160" text-anchor="middle" font-size="12.5" fill="#5c6673">구현 일지 → journal/</text>

  <!-- ①→② -->
  <path d="M370,131 L502,131" fill="none" stroke="#6b7686" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===== 학습 레이어 밴드 ===== -->
  <rect x="20" y="214" width="840" height="558" rx="14" fill="#f9f5ec" stroke="#ece0c8"/>
  <text x="40" y="240" font-size="13" font-weight="700" fill="#b9822f">학습 레이어 · 단계가 끝난 뒤, 학습자가 고른 것만 깊게</text>

  <!-- ②→③ (단계 완료) -->
  <path d="M660,176 C660,246 470,250 442,296" fill="none" stroke="#6b7686" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="600" y="240" font-size="12.5" font-weight="700" fill="#8a6a2a">단계 완료</text>

  <!-- ③ 통합 개요 -->
  <rect x="290" y="298" width="300" height="90" rx="10" fill="#ffffff" stroke="#b9822f" stroke-width="1.6"/>
  <text x="440" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#8a6a2a">③ 통합 개요 · overview/</text>
  <text x="440" y="352" text-anchor="middle" font-size="12.5" fill="#5c6673">한 단계의 학습거리를 한 문서에</text>
  <text x="440" y="372" text-anchor="middle" font-size="12.5" fill="#5c6673">개념 [N]  +  구현 유닛 [U N]</text>

  <!-- ③→ 개념 / 구현 -->
  <path d="M412,388 C330,406 262,416 218,438" fill="none" stroke="#6b7686" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M468,388 C556,406 618,416 662,438" fill="none" stroke="#6b7686" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 개념 학습 -->
  <rect x="60" y="440" width="312" height="136" rx="10" fill="#e9f6f2" stroke="#1f8a70" stroke-width="1.6"/>
  <text x="216" y="470" text-anchor="middle" font-size="15" font-weight="700" fill="#166b57">개념 학습</text>
  <text x="216" y="494" text-anchor="middle" font-size="12.5" fill="#3a5751">개념 [N] · 선행 [P1]</text>
  <text x="216" y="516" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166b57">추천 점수 = 지금 이해할 가치</text>
  <text x="216" y="540" text-anchor="middle" font-size="12.5" fill="#3a5751">→ learn/개념명/ · 섹션별 깊은 설명</text>
  <text x="216" y="560" text-anchor="middle" font-size="12.5" fill="#3a5751">튜터 목소리 · 코드 앵커 ❶❷❸</text>

  <!-- 구현 장악 -->
  <rect x="508" y="440" width="312" height="136" rx="10" fill="#eeecf8" stroke="#5a54a8" stroke-width="1.6"/>
  <text x="664" y="470" text-anchor="middle" font-size="15" font-weight="700" fill="#463f93">구현 장악</text>
  <text x="664" y="494" text-anchor="middle" font-size="12.5" fill="#494565">구현 유닛 [U N]</text>
  <text x="664" y="516" text-anchor="middle" font-size="12.5" font-weight="700" fill="#463f93">장악 점수 = 직접 만들 가치</text>
  <text x="664" y="540" text-anchor="middle" font-size="12.5" fill="#494565">→ learn/구현여정/ · 구현 과정 관전</text>
  <text x="664" y="560" text-anchor="middle" font-size="12.5" fill="#494565">일지를 시간 순서로 재생 · 생성/검증</text>

  <!-- 가운데 두 점수 대비 -->
  <text x="440" y="500" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a6a2a">두 점수는</text>
  <text x="440" y="518" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a6a2a">다른 축</text>
  <text x="440" y="536" text-anchor="middle" font-size="11.5" fill="#9a7a3a">환산 X</text>

  <!-- 개념/구현 → ④ -->
  <path d="M216,576 C216,592 360,598 400,606" fill="none" stroke="#6b7686" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M664,576 C664,592 520,598 480,606" fill="none" stroke="#6b7686" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ④ 평가 -->
  <rect x="300" y="606" width="280" height="60" rx="10" fill="#ffffff" stroke="#b9822f" stroke-width="1.6"/>
  <text x="440" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#8a6a2a">④ 평가</text>
  <text x="440" y="653" text-anchor="middle" font-size="12.5" fill="#5c6673">개념: 이해 확인 · 구현: 생성/검증</text>

  <!-- ④→⑤ -->
  <path d="M440,666 L440,690" fill="none" stroke="#6b7686" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ⑤ 프로필 -->
  <rect x="262" y="692" width="356" height="60" rx="10" fill="#ffffff" stroke="#b9822f" stroke-width="1.6"/>
  <text x="440" y="718" text-anchor="middle" font-size="15" font-weight="700" fill="#8a6a2a">⑤ 프로필 갱신</text>
  <text x="440" y="739" text-anchor="middle" font-size="12" fill="#5c6673">~/.claude/profile/LEARNING_PROFILE.md · 전역 단일 원본</text>

  <!-- 다음 단계 루프 (오른쪽 게터) -->
  <path d="M618,722 C842,736 852,600 852,300 C852,150 842,124 818,124" fill="none" stroke="#9aa4b2" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="852" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#7b8695" transform="rotate(90 852 470)">다음 단계로</text>
</svg>
