<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" font-family="'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif">
  <defs>
    <marker id="dn" markerWidth="9" markerHeight="9" refX="3" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,0 L3,7 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ================= LEFT: danger ================= -->
  <text x="215" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">① 트랜잭션 안에서 발송 — 위험</text>

  <!-- tx box (dashed = boundary) -->
  <rect x="34" y="52" width="362" height="212" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="52" y="74" font-size="11.5" font-weight="700" fill="#b91c1c">@Transactional 경계 (안)</text>

  <text x="60" y="104" font-size="12.5" fill="#0f172a">① 저장 · 생성 (Notification PENDING)</text>
  <line x1="70" y1="112" x2="70" y2="130" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#dn)"/>

  <rect x="52" y="138" width="326" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.3"/>
  <text x="60" y="158" font-size="12.5" font-weight="700" fill="#b91c1c">② 📧 발송 — 메일이 진짜로 나간다</text>
  <line x1="70" y1="170" x2="70" y2="188" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#dn)"/>

  <text x="60" y="200" font-size="12.5" fill="#0f172a">③ ✗ 이후 어딘가 실패</text>
  <line x1="70" y1="208" x2="70" y2="226" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#dn)"/>

  <text x="60" y="238" font-size="12.5" font-weight="700" fill="#b91c1c">④ ↩ 롤백 — 트랜잭션 통째로 되감김</text>

  <!-- outcome -->
  <text x="52" y="298" font-size="12" fill="#334155">DB: 되감겨 <tspan font-weight="700">알림이 없던 일</tspan>이 된다</text>
  <text x="52" y="320" font-size="12" fill="#334155">메일: <tspan font-weight="700" fill="#b91c1c">이미 나갔다 → 회수 불가</tspan></text>
  <rect x="34" y="336" width="362" height="34" rx="7" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.3"/>
  <text x="215" y="358" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">DB엔 없는 알림의 메일이 현실에 남는다</text>

  <!-- divider -->
  <line x1="420" y1="52" x2="420" y2="400" stroke="#e2e8f0" stroke-width="1.4"/>

  <!-- ================= RIGHT: safe ================= -->
  <text x="628" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">② 커밋 후 발송 — 안전</text>

  <!-- tx box -->
  <rect x="446" y="52" width="362" height="128" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="464" y="74" font-size="11.5" font-weight="700" fill="#15803d">@Transactional 경계 (안)</text>
  <text x="472" y="104" font-size="12.5" fill="#0f172a">① 저장 · 생성 (Notification PENDING)</text>
  <line x1="482" y1="112" x2="482" y2="130" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#dn)"/>
  <rect x="464" y="138" width="326" height="30" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.3"/>
  <text x="472" y="158" font-size="12.5" font-weight="700" fill="#15803d">② ✓ 커밋 — 여기서 트랜잭션이 닫힌다</text>

  <!-- outside boundary -->
  <line x1="628" y1="180" x2="628" y2="202" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#dn)"/>
  <text x="628" y="196" text-anchor="middle" font-size="10.5" fill="#64748b" font-style="italic">경계 밖 (커밋 이후)</text>
  <rect x="464" y="208" width="326" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.3"/>
  <text x="472" y="228" font-size="12.5" font-weight="700" fill="#1e40af">③ 📧 발송 → SENT</text>

  <!-- outcome -->
  <text x="464" y="298" font-size="12" fill="#334155">롤백되면 <tspan font-weight="700">커밋을 못 해</tspan> 발송 대상이 아니다</text>
  <text x="464" y="320" font-size="12" fill="#334155"><tspan font-weight="700" fill="#15803d">확정(커밋)된 것만</tspan> 메일이 된다</text>
  <rect x="446" y="336" width="362" height="34" rx="7" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
  <text x="628" y="358" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803d">DB와 현실이 어긋나는 일이 없다</text>

  <!-- bottom rule -->
  <text x="420" y="428" text-anchor="middle" font-size="12" fill="#475569">규칙 한 줄 — <tspan font-weight="700" fill="#0f172a">비가역 부수효과(메일)는 트랜잭션 경계 밖, 커밋 뒤에서</tspan></text>
  <text x="420" y="448" text-anchor="middle" font-size="11" fill="#94a3b8">이 감각이 8단계 Outbox("커밋된 PENDING만 릴레이가 발행")로 그대로 자란다</text>
</svg>
